<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://45.151.30.106:17654 https: data:; connect-src http://45.151.30.106:17654 https:; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Загрузки</title>
  <link rel="stylesheet" href="./internal.css">
  <style>
    .list { display:grid; gap:10px; }
    .card { display:flex; align-items:center; gap:14px; text-decoration:none; color:var(--text); background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:16px 18px; box-shadow:0 16px 44px rgba(0,0,0,.12); backdrop-filter:blur(18px); transition:transform .22s ease, border-color .22s ease, background .22s ease; }
    .card:hover { transform:translateY(-2px); border-color:var(--accent2); background:var(--panel2); }
    .favicon { width:28px; height:28px; border-radius:8px; display:grid; place-items:center; overflow:hidden; background:var(--panel2); color:var(--accent2); font-weight:900; flex:0 0 auto; }
    .content { min-width:0; flex:1; }
    .title { font-weight:800; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .url { font-size:13px; color:var(--accent2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .meta { font-size:12px; color:var(--muted); margin-top:4px; }
    .empty { padding:32px; text-align:center; color:var(--muted); background:var(--panel); border:1px solid var(--border); border-radius:8px; }
    .row-actions { display:flex; gap:8px; flex:0 0 auto; }
    .small { border:none; border-radius:8px; padding:8px 10px; background:var(--panel2); border:1px solid var(--border); color:var(--text); cursor:pointer; }
    .small.danger { border-color:color-mix(in srgb, var(--accent) 45%, transparent); font-weight:800; }
    .progress { height:5px; margin-top:8px; border-radius:999px; background:var(--panel2); overflow:hidden; }
    .bar { height:100%; background:linear-gradient(90deg, var(--accent3), var(--accent)); width:0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="brand"><div class="mark">↓</div>Загрузки</div>
      <div class="actions"><button class="btn secondary" id="clearBtn">Очистить список</button></div>
    </div>
    <div id="list" class="list"></div>
  </div>
  <script src="./downloads.js"></script>
</body>
</html>
